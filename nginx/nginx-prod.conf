events { 
    worker_connections 1024; 
}

http {
    include mime.types;
    client_max_body_size 50M;
    server_tokens off;

    # 🛡️ SECURITY HEADERS
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SSL Session Cache (Performance)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # =====================================================
    # HTTP Server - ACME Challenge + HTTPS Redirect
    # =====================================================
    server {
        listen 80;
        server_name secops-ensaf.com www.secops-ensaf.com ctf.secops-ensaf.com;

        # Allow Certbot ACME challenge for SSL verification
        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html/webroot;
            try_files $uri =404;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =====================================================
    # 1. CTFd (Subdomain) - SECURE HTTPS
    # =====================================================
    server {
        listen 443 ssl http2;
        server_name ctf.secops-ensaf.com;

        # SSL Certificate Configuration
        ssl_certificate /etc/letsencrypt/live/secops-ensaf.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/secops-ensaf.com/privkey.pem;
        
        # Modern SSL/TLS Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers off;

        # OCSP Stapling (Performance & Security)
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Security Headers for CTFd
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://ctfd-nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            
            # WebSocket support (if CTFd uses it)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # =====================================================
    # 2. Landing Page (Main Domain) - SECURE HTTPS
    # =====================================================
    server {
        listen 443 ssl http2;
        server_name secops-ensaf.com www.secops-ensaf.com;

        # SSL Certificate Configuration
        ssl_certificate /etc/letsencrypt/live/secops-ensaf.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/secops-ensaf.com/privkey.pem;
        
        # Modern SSL/TLS Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers off;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # =====================================================
    # 3. Fallback for IP Direct Access (Optional)
    # =====================================================
    server {
        listen 443 ssl http2 default_server;
        server_name 37.59.124.184;

        ssl_certificate /etc/letsencrypt/live/secops-ensaf.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/secops-ensaf.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Redirect IP access to main domain
        return 301 https://secops-ensaf.com$request_uri;
    }
}