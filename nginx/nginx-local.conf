events { worker_connections 1024; }

http {
    include mime.types;
    client_max_body_size 50M;

    # =========================================================
    # 1. Landing Page (The DEFAULT Room) - localhost
    # =========================================================
    server {
        listen 80 default_server;  # <--- MAGIC TAG: Makes this the priority
        server_name secops.local;

        location / {
            # Points to Port 80 (The Static Suit Build)
            proxy_pass http://frontend:80; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # =========================================================
    # 2. CTFd (The Exam Hall) - ctf.localhost
    # =========================================================
    server {
        listen 80;
        server_name ctf.secops.local; 

        location / {
            proxy_pass http://ctfd-nginx:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}