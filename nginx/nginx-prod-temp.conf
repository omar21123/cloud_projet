events { 
    worker_connections 1024; 
}

http {
    include mime.types;
    client_max_body_size 50M;
    server_tokens off;

    # =====================================================
    # HTTP ONLY - For Certificate Acquisition
    # =====================================================
    server {
        listen 80;
        server_name secops-ensaf.com www.secops-ensaf.com ctf.secops-ensaf.com;

        # ACME Challenge for Certbot
        location /.well-known/acme-challenge/ {
            root /usr/share/nginx/html/webroot;
            try_files $uri =404;
        }

        # Temporary: Serve all traffic on HTTP
        location / {
            return 200 "Temporary HTTP server - SSL setup in progress\n";
            add_header Content-Type text/plain;
        }
    }
}
