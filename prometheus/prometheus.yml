global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['monitoring-node-exporter:9100'] # <--- Ajoute 'monitoring-'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['monitoring-cadvisor:8080']    # <--- Ajoute 'monitoring-'
