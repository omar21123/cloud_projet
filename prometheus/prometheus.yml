global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['monitoring-node-exporter:9100']

  - job_name: 'telegraf'
    static_configs:
      - targets: ['monitoring-telegraf:9273']
