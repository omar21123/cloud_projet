version: '3.8'

services:
  # 1. Main Router (Optional in local, but good for testing)
  nginx-proxy:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - ctfd

  # 2. React (Development Mode - Hot Reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev  
    container_name: secops_dev_frontend

    environment:
      - CHOKIDAR_USEPOLLING=true   
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend/src:/app/src    <-- Syncs your code to container
      - ./frontend/public:/app/public
      - /app/node_modules
    ports:
      - "3000:3000"                

  # 3. CTFd (Standard)
  ctfd:
    image: ctfd/ctfd
    user: root
    ports:
      - "8000:8000"
    environment:
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=mysql+pymysql://ctfd:ctfd@db/ctfd
      - REDIS_URL=redis://cache:6379
      - WORKERS=1
    volumes:
      - .data/ctfd_uploads:/var/uploads
    depends_on:
      - db
      - cache

  db:
    image: mariadb:10.11
    environment:
      - MARIADB_ROOT_PASSWORD=ctfd
      - MARIADB_USER=ctfd
      - MARIADB_PASSWORD=ctfd
      - MARIADB_DATABASE=ctfd
    volumes:
      - .data/mysql:/var/lib/mysql

  cache:
    image: redis:4
    volumes:
      - .data/redis:/data